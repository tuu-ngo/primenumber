<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Number Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="student-badge">
    <span class="student-name">Ngo Huu Tai</span>
    <span class="student-id">ID: 29210252499</span>
  </div>

  <main class="container">
    <header class="header">
      <h1>Prime Number Checker</h1>
      <p class="subtitle">Check whether an integer is a prime number</p>
    </header>

    <section class="card">
      <form id="primeForm" autocomplete="off" novalidate>
        <label for="numberInput">Enter an integer</label>
        <div class="input-row">
          <input
            type="text"
            id="numberInput"
            name="number"
            placeholder="e.g. 17, 97, 1000003"
            inputmode="numeric"
            autocomplete="off"
          />
          <button type="submit">Check</button>
        </div>
        <p class="hint">Accepts positive and negative integers</p>
      </form>

      <div id="result" class="result hidden" role="alert" aria-live="polite"></div>
    </section>

    <section class="card">
      <h2>Quick Examples</h2>
      <div class="examples-grid">
        <button class="chip prime"     onclick="tryExample(2)">2</button>
        <button class="chip prime"     onclick="tryExample(3)">3</button>
        <button class="chip prime"     onclick="tryExample(17)">17</button>
        <button class="chip prime"     onclick="tryExample(97)">97</button>
        <button class="chip prime"     onclick="tryExample(1000003)">1,000,003</button>
        <button class="chip not-prime" onclick="tryExample(0)">0</button>
        <button class="chip not-prime" onclick="tryExample(1)">1</button>
        <button class="chip not-prime" onclick="tryExample(4)">4</button>
        <button class="chip not-prime" onclick="tryExample(100)">100</button>
        <button class="chip not-prime" onclick="tryExample(-7)">−7</button>
      </div>
      <p class="legend">
        <span class="dot prime"></span> Prime &nbsp;
        <span class="dot not-prime"></span> Not prime
      </p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
